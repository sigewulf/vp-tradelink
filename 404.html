<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script id="vpt-early-lang">(function(){try{var l=localStorage.getItem('vpt_lang')||'en';document.documentElement.setAttribute('lang',l);if(l==='ar')document.documentElement.setAttribute('dir','rtl');if(l!=='en'){document.documentElement.classList.add('i18n-loading');setTimeout(function(){document.documentElement.classList.remove('i18n-loading');},600);}}catch(e){}})();</script>

  <script
    src="https://js.sentry-cdn.com/7d527155e14ee64af29818be5352474f.min.js"
    crossorigin="anonymous"
  ></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found | VP TRADELINK</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/logo/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=2026">
  <link rel="stylesheet" href="css/base.css?v=2026">
  <link rel="stylesheet" href="css/components.css?v=2026">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      background: var(--off-white);
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.05em;
      line-height: 1;
      opacity: 0.1;
      margin-bottom: -1rem;
    }
    .error-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .error-desc {
      font-size: 1rem;
      color: var(--grey-600);
      max-width: 420px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }
    .error-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-nav {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--grey-100);
      width: 100%;
      max-width: 560px;
    }
    .error-nav-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-600);
      margin-bottom: 1rem;
    }
    .error-nav-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-nav-links a {
      font-size: 0.9rem;
      color: var(--navy);
      font-weight: 500;
      transition: color 0.18s;
    }
    .error-nav-links a:hover { color: var(--gold-dark); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you are looking for has moved, been renamed, or does not exist. Use the links below to find what you need.</p>
    <div class="error-links">
      <a href="index.html" class="btn btn-primary">Back to Homepage</a>
      <a href="products.html" class="btn btn-ghost">View Products</a>
    </div>
    <div class="error-nav">
      <p class="error-nav-label">Quick Navigation</p>
      <div class="error-nav-links">
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="markets.html">Markets</a>
        <a href="how-we-work.html">How We Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
    <p style="margin-top:2rem;font-size:0.8rem;color:var(--grey-600);">VP TRADELINK &mdash; Gujarat, India &mdash; <a href="mailto:shezad@vptradelink.com" style="color:var(--grey-600);">shezad@vptradelink.com</a></p>
  </div>
</body>
</html>
